version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: govsignal
      POSTGRES_USER: govsignal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govsignal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ──
  api:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://govsignal:${DB_PASSWORD:-changeme}@db:5432/govsignal
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID}
      STRIPE_AGENCY_PRICE_ID: ${STRIPE_AGENCY_PRICE_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      SAM_GOV_API_KEY: ${SAM_GOV_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node src/index.js"

volumes:
  postgres_data:
